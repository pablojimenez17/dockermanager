name: Deploy to VPS
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin
            cd /opt/dockermanager

            echo ">>> Pulling latest code..."
            git pull https://x-access-token:${GITHUB_TOKEN}@github.com/pablojimenez17/dockermanager.git main

            echo ">>> Stopping containers gracefully..."
            docker compose -f docker-compose.yml down --timeout 30

            echo ">>> Pruning stale images (optional, libera espacio)..."
            docker image prune -f

            echo ">>> Building and starting containers..."
            docker compose -f docker-compose.yml up -d --build --remove-orphans

            echo ">>> Waiting for containers to be healthy..."
            sleep 5
            docker compose -f docker-compose.yml ps

            echo ">>> Smoke test Traefik (inside proxy netns — avoids Suricata/DNAT on localhost)..."
            # Exit 56 from curl on the host was recv error via edge-fw → not a reliable Traefik check.
            STATUS_CODE=""
            for attempt in 1 2 3 4 5 6; do
              STATUS_CODE=$(docker run --rm --network container:dockermanager-proxy curlimages/curl:8.5.0 \
                -s -o /dev/null -w "%{http_code}" --connect-timeout 8 --max-redirs 0 \
                -H "Host: orbitcloud.app" http://127.0.0.1:80/ || echo "000")
              if [ "$STATUS_CODE" != "000" ] && [ -n "$STATUS_CODE" ]; then
                break
              fi
              echo "  ... Traefik not ready yet (attempt $attempt/6), sleep 5s"
              sleep 5
            done
            if [ "$STATUS_CODE" = "404" ]; then
              echo "ERROR: Traefik still returning 404 for orbitcloud.app (no matching router?)"
              echo "=== docker compose ps ==="
              docker compose -f docker-compose.yml ps || true
              echo "=== traefik logs (last 120 lines) ==="
              docker logs --tail 120 dockermanager-proxy || true
              echo "=== frontend logs (last 120 lines) ==="
              docker logs --tail 120 dockermanager-frontend || true
              exit 1
            fi
            if [ "$STATUS_CODE" = "000" ] || [ -z "$STATUS_CODE" ]; then
              echo "ERROR: Could not connect to Traefik on :80 inside proxy container"
              docker compose -f docker-compose.yml ps || true
              exit 1
            fi
            echo "Smoke test HTTP status (entrypoint :80, redirects not followed): $STATUS_CODE"

            echo ">>> Deploy completed successfully"
