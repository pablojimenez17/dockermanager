name: Deploy to VPS
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin
            cd /opt/dockermanager

            echo ">>> Pulling latest code..."
            git pull https://x-access-token:${GITHUB_TOKEN}@github.com/pablojimenez17/dockermanager.git main

            echo ">>> Stopping containers gracefully..."
            docker compose -f docker-compose.yml down --timeout 30

            echo ">>> Pruning stale images (optional, libera espacio)..."
            docker image prune -f

            echo ">>> Building and starting containers..."
            docker compose -f docker-compose.yml up -d --build --remove-orphans

            echo ">>> Waiting for containers to be healthy..."
            sleep 5
            docker compose -f docker-compose.yml ps

            echo ">>> Smoke test Traefik router for orbitcloud.app..."
            STATUS_CODE=$(curl -s -o /tmp/orbitcloud-smoke.html -w "%{http_code}" -H "Host: orbitcloud.app" http://127.0.0.1/)
            if [ "$STATUS_CODE" = "404" ]; then
              echo "ERROR: Traefik still returning 404 for orbitcloud.app"
              echo "=== docker compose ps ==="
              docker compose -f docker-compose.yml ps || true
              echo "=== traefik logs (last 120 lines) ==="
              docker logs --tail 120 dockermanager-proxy || true
              echo "=== frontend logs (last 120 lines) ==="
              docker logs --tail 120 dockermanager-frontend || true
              exit 1
            fi
            echo "Smoke test HTTP status: $STATUS_CODE"

            echo ">>> Deploy completed successfully"
