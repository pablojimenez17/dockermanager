# Local development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    command: npm run dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host 0.0.0.0 --port 80
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  minio:
    ports:
      - "9001:9001"
      - "9000:9000"
    networks:
      - storage_net
      - dmz_net
