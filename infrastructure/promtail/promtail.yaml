server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://dockermanager-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: suricata
    static_configs:
      - targets:
          - localhost
        labels:
          job: suricata
          host: dockermanager-edge-fw
          __path__: /var/log/suricata/eve.json

    pipeline_stages:
      - json:
          expressions:
            event_type: event_type
            src_ip: src_ip
            dest_ip: dest_ip
            proto: proto
            alert_signature: alert.signature
            alert_severity: alert.severity
            timestamp: timestamp

      - labels:
          event_type:
          proto:

      - timestamp:
          source: timestamp
          format: RFC3339Nano
