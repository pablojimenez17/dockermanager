networks:
  public_net:
    driver: bridge
  transit_proxy_inverso:
    driver: bridge
  transit_proxy_forward:
    driver: bridge
  dmz_net:
    driver: bridge
  lan_net:
    driver: bridge
    internal: true # Cannot route to internet natively unless going through proxy
  storage_transit_net:
    driver: bridge
  storage_net:
    driver: bridge
    internal: true
  # FIX #5: cAdvisor gets its own isolated monitoring network
  monitoring_net:
    driver: bridge
    internal: true

services:
  # 1. Edge Firewall (IDS/IPS via Suricata)
  # FIX #1: Suricata now owns ports 80/443 and DNAT-forwards to Traefik via iptables
  edge-fw:
    image: jasonish/suricata:latest
    container_name: dockermanager-edge-fw
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      - public_net
      - transit_proxy_inverso
      - transit_proxy_forward
    # FIX #1: Suricata owns 80/443. Traffic is DNAT-forwarded to Traefik via iptables PREROUTING.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/edge-fw.sh:/docker-entrypoint.sh:ro
      - suricata-logs:/var/log/suricata
      - suricata-rules:/var/lib/suricata
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]

  # 1.5 Log Aggregation (Loki) — stores Suricata eve.json events
  loki:
    image: grafana/loki:2.9.0
    container_name: dockermanager-loki
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - loki-data:/loki
      - ./infrastructure/loki/loki.yaml:/etc/loki/loki.yaml:ro
    networks:
      - monitoring_net
    restart: unless-stopped

  # 1.6 Log Shipper (Promtail) — reads eve.json and sends to Loki
  promtail:
    image: grafana/promtail:2.9.0
    container_name: dockermanager-promtail
    command: -config.file=/etc/promtail/promtail.yaml
    volumes:
      - suricata-logs:/var/log/suricata:ro
      - ./infrastructure/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
    networks:
      - monitoring_net
    restart: unless-stopped
    depends_on:
      - loki

  # 2. Reverse Proxy (Traefik) - Proxy Inverso
  # FIX #1: Traefik no longer binds 80/443 directly — receives forwarded traffic from Suricata
  # FIX #4: Prometheus protected with BasicAuth via Traefik (middleware defined here)
  proxy-inverso:
    image: traefik:v2
    container_name: dockermanager-proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=a22pabjimpri@inspedralbes.cat"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.constraints=Label(`traefik.constraint-label`, `dmz-proxy`)"
    networks:
      - transit_proxy_inverso
      - dmz_net
    volumes:
      - letsencrypt-data:/letsencrypt
    # FIX #1: Ports removed — Suricata owns 80/443 and DNAT-forwards here
    # ports:
    #   - "80:80"
    #   - "443:443"
    depends_on:
      - socket-proxy

  # 3. LAN Reverse Proxy (Traefik for user containers)
  lan-proxy:
    image: traefik:v2
    container_name: dockermanager-lan-proxy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.constraints=Label(`traefik.constraint-label`, `lan-proxy`)"
    networks:
      - transit_proxy_forward
      - lan_net
    depends_on:
      - socket-proxy

  # 4. DMZ: Docker Socket Proxy (Security Enhancement)
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: dockermanager-socket-proxy
    environment:
      # We allow the specific actions the backend needs to manage user containers
      - CONTAINERS=1 # Allow container list, create, start, stop, kill
      - IMAGES=1 # Allow image list, pull
      - NETWORKS=1 # Allow network list, create
      - VOLUMES=1 # Allow volume create
      - EXEC=1 # Allow exec (terminals)
      - BUILD=1
      - POST=1 # Allow POST requests like create, start, stop, kill, pull
      - DELETE=1 # Allow DELETE requests like rm
      # Allow system info and df (required for storage calculations)
      - SYSTEM=1
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Read-only!
    networks:
      - dmz_net

  # 5. DMZ: Backend
  # FIX #3: Backend router now accepts both web and websecure entrypoints
  # FIX #7: Credentials read from environment variables (.env / Docker Secrets)
  # HA: restart:always + healthcheck ensure the service recovers automatically
  backend:
    build: ./backend
    image: dockermanager/backend:local
    container_name: dockermanager-backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - MONGO_URI=mongodb://mongodb:27017/dockermanager
      - DOCKER_HOST=tcp://socket-proxy:2375
      - MINIO_ENDPOINT=storage-fw
      - MINIO_PORT=9000
      # MinIO credentials — same source as the MinIO container itself
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MONGO_CONTAINER_NAME=dockermanager-mongo
    networks:
      - dmz_net
      - storage_transit_net
    depends_on:
      - mongodb
      - socket-proxy
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=dmz-proxy"
      - "traefik.http.routers.backend.rule=HostRegexp(`^(www\\.)?orbitcloud\\.app$`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
      # FIX #3: Accept both HTTP and HTTPS — global redirect handles the upgrade
      - "traefik.http.routers.backend.entrypoints=web,websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"
      - "traefik.docker.network=dmz_net"

  # 6. DMZ: Frontend
  # HA: restart:always + healthcheck keep the frontend always available
  frontend:
    build: ./frontend
    image: dockermanager/frontend:local
    container_name: dockermanager-frontend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - dmz_net
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=dmz-proxy"
      - "traefik.http.routers.frontend.rule=HostRegexp(`^(www\\.)?orbitcloud\\.app$`)"
      - "traefik.http.routers.frontend.entrypoints=web,websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=dmz_net"

  # 7. DMZ: MongoDB
  # HA: restart:always keeps MongoDB up after host reboots
  mongodb:
    image: mongo:latest
    container_name: dockermanager-mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - dmz_net

  # 8. Storage Firewall (HAProxy acting as internal firewall bridge)
  storage-fw:
    image: haproxy:alpine
    container_name: dockermanager-storage-fw
    networks:
      - storage_transit_net
      - storage_net
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

  # 9. Storage: MinIO
  # FIX #2: dmz_net removed — MinIO is only on storage_net (invisible from DMZ)
  # FIX #7: Credentials sourced from .env — no hardcoded values
  minio:
    image: minio/minio:latest
    container_name: dockermanager-minio
    environment:
      # FIX #7: Credentials from environment, not hardcoded
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      # FIX #2: Only storage_net — HAProxy (storage-fw) is the sole gateway from DMZ.
      # MinIO is NOT on dmz_net, so Traefik labels are removed (Traefik cannot reach it).
      # Access the MinIO console directly via storage-fw or a VPN/bastion.
      - storage_net

  # 10. Observability: Prometheus
  # FIX #4: Prometheus now protected with BasicAuth via Traefik middleware
  prometheus:
    image: prom/prometheus:latest
    container_name: dockermanager-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      # Prometheus needs dmz_net (reachable by Grafana + Traefik)
      # AND monitoring_net to scrape cAdvisor and node-exporter
      - dmz_net
      - monitoring_net
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=dmz-proxy"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.orbitcloud.app`)"
      - "traefik.http.routers.prometheus.entrypoints=web,websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      # FIX #4: BasicAuth — protect metrics endpoint from public access
      - "traefik.http.routers.prometheus.middlewares=prometheus-auth"
      - "traefik.http.middlewares.prometheus-auth.basicauth.users=${PROMETHEUS_BASICAUTH_USERS}"
      - "traefik.docker.network=dmz_net"

  # 11. Observability: Grafana
  # FIX #7: Grafana credentials sourced from .env
  grafana:
    image: grafana/grafana:latest
    container_name: dockermanager-grafana
    networks:
      - dmz_net
      - monitoring_net  # needed to reach Loki (dockermanager-loki:3100)
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      # FIX #7: Credentials from environment, not hardcoded
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=dmz-proxy"
      - "traefik.http.routers.grafana.rule=Host(`grafana.orbitcloud.app`)"
      - "traefik.http.routers.grafana.entrypoints=web,websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.docker.network=dmz_net"

  # 12. Observability: Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: dockermanager-node-exporter
    pid: host
    volumes:
      - /:/rootfs:ro
    command:
      - '--path.rootfs=/rootfs'
    networks:
      # FIX #5: Only on monitoring_net — Prometheus scrapes it internally,
      # node-exporter is not reachable from dmz_net directly
      - monitoring_net

  # 13. Observability: cAdvisor (Container Metrics)
  # FIX #5: cAdvisor moved to isolated monitoring_net — not directly reachable from DMZ
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: dockermanager-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      # FIX #5: Isolated monitoring network — Prometheus scrapes via monitoring_net,
      # cAdvisor is NOT directly reachable from dmz_net
      - monitoring_net

volumes:
  mongo-data:
  minio-data:
  letsencrypt-data:
  suricata-logs:
  suricata-rules:
  prometheus-data:
  grafana-data:
  evebox-data:
  loki-data:
