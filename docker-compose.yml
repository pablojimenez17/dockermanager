networks:
  public_net:
    driver: bridge
  transit_proxy_inverso:
    driver: bridge
  transit_proxy_forward:
    driver: bridge
  dmz_net:
    driver: bridge
  lan_net:
    driver: bridge
    internal: true # Cannot route to internet natively unless going through proxy
  storage_transit_net:
    driver: bridge
  storage_net:
    driver: bridge
    internal: true

services:
  # 1. Edge Firewall (IDS/IPS via Suricata)
  edge-fw:
    image: jasonish/suricata:latest
    container_name: dockermanager-edge-fw
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    # For a real implementation, we simulate it by attaching to networks.
    # In a full setup, this container would have iptables rules to forward traffic.
    # We will attach it to public and transit networks.
    networks:
      - public_net
      - transit_proxy_inverso
      - transit_proxy_forward
    # For now, port mapping is directly on traefik to ensure UI works out of the box without complex manual iptables scripting inside the suricata container. But to respect the diagram strictly, one might map 80/443 here and use iptables PREROUTING to traefik.
    # ports:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - ./config/edge-fw.sh:/docker-entrypoint.sh:ro
      - suricata-logs:/var/log/suricata
      - suricata-rules:/var/lib/suricata
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]

  # 1.5 Edge Firewall UI (EveBox)
  evebox:
    image: jasonish/evebox:latest
    container_name: dockermanager-evebox
    command: evebox server --datastore sqlite --sqlite /tmp/evebox.sqlite -i /var/log/suricata/eve.json --no-tls --no-auth
    ports:
      - "5636:5636"
    volumes:
      - suricata-logs:/var/log/suricata:ro
    networks:
      - public_net

  # 2. Reverse Proxy (Traefik) - Proxy Inverso
  proxy-inverso:
    image: traefik:v2.10
    container_name: dockermanager-proxy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=a22pabjimpri@inspedralbes.cat"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.constraints=Label(`traefik.constraint-label`, `dmz-proxy`)"
    networks:
      - transit_proxy_inverso
      - dmz_net
    volumes:
      - letsencrypt-data:/letsencrypt
    # If edge-fw isn't reliably forwarding (which requires an iptables bash script), 
    # uncomment these ports to access the web UI directly:
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - socket-proxy

  # 3. LAN Reverse Proxy (Traefik for user containers)
  lan-proxy:
    image: traefik:v2.10
    container_name: dockermanager-lan-proxy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.constraints=Label(`traefik.constraint-label`, `lan-proxy`)"
    networks:
      - transit_proxy_forward
      - lan_net
    depends_on:
      - socket-proxy

  # 4. DMZ: Docker Socket Proxy (Security Enhancement)
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: dockermanager-socket-proxy
    environment:
      # We allow the specific actions the backend needs to manage user containers
      - CONTAINERS=1 # Allow container list, create, start, stop, kill
      - IMAGES=1 # Allow image list, pull
      - NETWORKS=1 # Allow network list, create
      - VOLUMES=1 # Allow volume create
      - EXEC=1 # Allow exec (terminals)
      - BUILD=1
      - POST=1 # Allow POST requests like create, start, stop, kill, pull
      - DELETE=1 # Allow DELETE requests like rm
      # Explicitly deny full system access
      - SYSTEM=0
      - INFO=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Read-only!
    networks:
      - dmz_net

  # 5. DMZ: Backend
  backend:
    build: ./backend
    image: dockermanager/backend:local
    container_name: dockermanager-backend
    environment:
      - MONGO_URI=mongodb://mongodb:27017/dockermanager
      - DOCKER_HOST=tcp://socket-proxy:2375
      - MINIO_ENDPOINT=storage-fw
      - MINIO_PORT=9000
      # Zero-Trust Backup config (Network-based S3)
      - NAS_USERNAME=admin
      - NAS_PASSWORD=password123
      - BACKUP_INTERVAL_MS=86400000          # 24h
      - BACKUP_RETENTION=7
      - MONGO_CONTAINER_NAME=dockermanager-mongo
    networks:
      - dmz_net
      - storage_transit_net
    depends_on:
      - mongodb
      - socket-proxy
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=dmz-proxy"
      - "traefik.http.routers.backend.rule=Host(`orbitcloud.app`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"

  # 6. DMZ: Frontend
  frontend:
    build: ./frontend
    image: dockermanager/frontend:local
    container_name: dockermanager-frontend
    networks:
      - dmz_net
    labels:
      - "traefik.enable=true"
      - "traefik.constraint-label=dmz-proxy"
      - "traefik.http.routers.frontend.rule=Host(`orbitcloud.app`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # 7. DMZ: MongoDB
  mongodb:
    image: mongo:latest
    container_name: dockermanager-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - dmz_net

  # 8. Storage Firewall (HAProxy acting as internal firewall bridge)
  storage-fw:
    image: haproxy:alpine
    container_name: dockermanager-storage-fw
    networks:
      - storage_transit_net
      - storage_net
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

  # 9. Storage: MinIO
  minio:
    image: minio/minio:latest
    container_name: dockermanager-minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - storage_net

  # 10. Observability: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: dockermanager-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - dmz_net

  # 11. Observability: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: dockermanager-grafana
    networks:
      - dmz_net
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

  # 12. Observability: Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: dockermanager-node-exporter
    pid: host
    volumes:
      - /:/rootfs:ro
    command:
      - '--path.rootfs=/rootfs'
    networks:
      - dmz_net

  # 13. Observability: cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: dockermanager-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - dmz_net

volumes:
  mongo-data:
  minio-data:
  letsencrypt-data:
  suricata-logs:
  suricata-rules:
  prometheus-data:
  grafana-data:
