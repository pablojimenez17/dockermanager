global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    # node-exporter is on monitoring_net (isolated). Prometheus reaches it via that network.
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    # cAdvisor is on monitoring_net (isolated). Prometheus reaches it via that network.
    static_configs:
      - targets: ['cadvisor:8080']
